<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0EA5E9"/><stop offset="55%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#7DD3FC"/></linearGradient>
    <linearGradient id="sea5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2DD4BF"/><stop offset="50%" stop-color="#0D9488"/><stop offset="100%" stop-color="#134E4A"/></linearGradient>
    <linearGradient id="ship5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#E0F2F1"/></linearGradient>
    <linearGradient id="hull5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A3A5C"/><stop offset="100%" stop-color="#0D2137"/></linearGradient>
    <filter id="glow5"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#sky5)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="80" rx="90" ry="28" fill="white" opacity="0.85"/>
  <ellipse cx="155" cy="65" rx="65" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="600" cy="60" rx="100" ry="26" fill="white" opacity="0.75"/>
  <ellipse cx="660" cy="48" rx="65" ry="20" fill="white" opacity="0.75"/>
  <ellipse cx="350" cy="100" rx="70" ry="18" fill="white" opacity="0.55"/>
  <!-- Sun -->
  <circle cx="680" cy="140" r="40" fill="#FCD34D" opacity="0.9" filter="url(#glow5)"/>
  <circle cx="680" cy="140" r="60" fill="#FCD34D" opacity="0.15"/>
  <!-- Sea -->
  <rect y="280" width="800" height="220" fill="url(#sea5)"/>
  <!-- Wave highlights -->
  <path d="M0 295 Q100 285 200 295 Q300 305 400 295 Q500 285 600 295 Q700 305 800 295" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" fill="none"/>
  <path d="M0 325 Q150 317 300 325 Q450 333 600 325 Q700 320 800 325" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
  <path d="M0 355 Q200 348 400 355 Q600 362 800 355" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/>
  <path d="M0 390 Q250 383 500 390 Q650 395 800 388" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>
  <!-- Cruise ship body -->
  <path d="M140 295 Q145 305 155 310 L645 310 Q655 305 660 295 Q650 285 400 280 Q150 285 140 295Z" fill="url(#hull5)"/>
  <!-- Ship superstructure (white upper part) -->
  <rect x="200" y="215" width="400" height="80" fill="url(#ship5)" rx="4"/>
  <rect x="220" y="175" width="360" height="45" fill="url(#ship5)" rx="3"/>
  <rect x="250" y="148" width="300" height="32" fill="url(#ship5)" rx="3"/>
  <rect x="300" y="130" width="200" height="22" fill="url(#ship5)" rx="3"/>
  <!-- Ship windows / decks -->
  <g fill="#2DD4BF" opacity="0.6">
    <rect x="225" y="222" width="18" height="10" rx="2"/><rect x="255" y="222" width="18" height="10" rx="2"/>
    <rect x="285" y="222" width="18" height="10" rx="2"/><rect x="315" y="222" width="18" height="10" rx="2"/>
    <rect x="345" y="222" width="18" height="10" rx="2"/><rect x="375" y="222" width="18" height="10" rx="2"/>
    <rect x="405" y="222" width="18" height="10" rx="2"/><rect x="435" y="222" width="18" height="10" rx="2"/>
    <rect x="465" y="222" width="18" height="10" rx="2"/><rect x="495" y="222" width="18" height="10" rx="2"/>
    <rect x="525" y="222" width="18" height="10" rx="2"/><rect x="555" y="222" width="18" height="10" rx="2"/>
  </g>
  <g fill="#0D9488" opacity="0.55">
    <rect x="240" y="182" width="12" height="8" rx="1"/><rect x="262" y="182" width="12" height="8" rx="1"/>
    <rect x="284" y="182" width="12" height="8" rx="1"/><rect x="306" y="182" width="12" height="8" rx="1"/>
    <rect x="328" y="182" width="12" height="8" rx="1"/><rect x="350" y="182" width="12" height="8" rx="1"/>
    <rect x="372" y="182" width="12" height="8" rx="1"/><rect x="394" y="182" width="12" height="8" rx="1"/>
    <rect x="416" y="182" width="12" height="8" rx="1"/><rect x="438" y="182" width="12" height="8" rx="1"/>
    <rect x="460" y="182" width="12" height="8" rx="1"/><rect x="482" y="182" width="12" height="8" rx="1"/>
    <rect x="504" y="182" width="12" height="8" rx="1"/><rect x="526" y="182" width="12" height="8" rx="1"/>
    <rect x="548" y="182" width="12" height="8" rx="1"/>
  </g>
  <!-- Funnels/smokestacks -->
  <rect x="340" y="90" width="28" height="45" fill="#FF7043" rx="3"/>
  <rect x="380" y="95" width="22" height="40" fill="#FF7043" rx="3"/>
  <rect x="430" y="90" width="28" height="45" fill="#FF7043" rx="3"/>
  <!-- Smoke puffs -->
  <ellipse cx="354" cy="85" rx="18" ry="10" fill="white" opacity="0.5"/>
  <ellipse cx="444" cy="85" rx="18" ry="10" fill="white" opacity="0.5"/>
  <!-- Rocky coast left -->
  <path d="M0 320 Q30 290 70 310 Q100 285 140 300 L140 500 L0 500Z" fill="#6D4C41" opacity="0.9"/>
  <!-- Rocky coast right -->
  <path d="M660 305 Q700 285 740 300 Q770 288 800 300 L800 500 L660 500Z" fill="#6D4C41" opacity="0.9"/>
  <!-- Sun reflection on sea -->
  <ellipse cx="680" cy="330" rx="40" ry="100" fill="#FCD34D" opacity="0.1" transform="rotate(0,680,330)"/>
  <!-- Destination badge -->
  <rect x="18" y="18" width="142" height="36" rx="18" fill="rgba(0,30,60,0.55)"/>
  <text x="89" y="41" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="white" font-weight="bold">🚢 Круизы</text>
</svg>
