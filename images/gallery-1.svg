<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF7043"/><stop offset="45%" stop-color="#FFAB91"/><stop offset="100%" stop-color="#2DD4BF"/></linearGradient>
    <linearGradient id="sea1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2DD4BF"/><stop offset="100%" stop-color="#0D9488"/></linearGradient>
    <linearGradient id="sand1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FDE68A"/><stop offset="100%" stop-color="#F59E0B"/></linearGradient>
    <radialGradient id="sun1" cx="50%" cy="50%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="60%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/></radialGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#sky1)"/>
  <!-- Sun glow -->
  <circle cx="400" cy="195" r="90" fill="#FF7043" opacity="0.25"/>
  <circle cx="400" cy="195" r="48" fill="url(#sun1)" filter="url(#glow1)"/>
  <!-- Clouds -->
  <ellipse cx="130" cy="120" rx="85" ry="22" fill="white" opacity="0.65"/>
  <ellipse cx="175" cy="107" rx="58" ry="19" fill="white" opacity="0.65"/>
  <ellipse cx="660" cy="95" rx="90" ry="23" fill="white" opacity="0.55"/>
  <ellipse cx="715" cy="83" rx="55" ry="17" fill="white" opacity="0.55"/>
