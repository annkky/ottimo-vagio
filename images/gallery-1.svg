  <ellipse cx="400" cy="310" rx="60" ry="120" fill="#FCD34D" opacity="0.12" transform="rotate(0,400,310)"/>
  <!-- Sandy island -->
  <ellipse cx="400" cy="435" rx="270" ry="52" fill="url(#sand1)"/>
  <ellipse cx="400" cy="415" rx="310" ry="25" fill="#2DD4BF" opacity="0.28"/>
  <!-- Palm left -->
  <path d="M195 455 Q200 385 215 330" stroke="#6D4C41" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M215 335 Q165 300 122 312" stroke="#2E7D32" stroke-width="7" stroke-linecap="round" fill="none"/>
  <ellipse cx="140" cy="315" rx="38" ry="13" fill="#388E3C" transform="rotate(-15 140 315)"/>
  <path d="M215 335 Q258 293 292 298" stroke="#2E7D32" stroke-width="7" stroke-linecap="round" fill="none"/>
  <ellipse cx="278" cy="300" rx="34" ry="12" fill="#2E7D32" transform="rotate(12 278 300)"/>
  <path d="M215 335 Q212 280 207 258" stroke="#43A047" stroke-width="6" stroke-linecap="round" fill="none"/>
  <ellipse cx="207" cy="265" rx="22" ry="10" fill="#43A047"/>
  <circle cx="214" cy="332" r="7" fill="#F59E0B"/>
  <!-- Palm right -->
  <path d="M605 455 Q598 388 580 330" stroke="#6D4C41" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M580 335 Q540 298 505 308" stroke="#2E7D32" stroke-width="7" stroke-linecap="round" fill="none"/>
  <ellipse cx="520" cy="311" rx="36" ry="12" fill="#388E3C" transform="rotate(15 520 311)"/>
  <path d="M580 335 Q622 292 652 298" stroke="#2E7D32" stroke-width="7" stroke-linecap="round" fill="none"/>
  <ellipse cx="638" cy="300" rx="32" ry="12" fill="#2E7D32" transform="rotate(-12 638 300)"/>
  <path d="M580 335 Q582 280 587 258" stroke="#43A047" stroke-width="6" stroke-linecap="round" fill="none"/>
  <ellipse cx="586" cy="265" rx="22" ry="10" fill="#43A047"/>
  <circle cx="579" cy="332" r="7" fill="#F59E0B"/>
  <!-- Overwater bungalow -->
  <rect x="355" y="318" width="90" height="55" fill="#FAF5E4" rx="3"/>
  <polygon points="342,318 458,318 400,278" fill="#D97706"/>
  <rect x="392" y="373" width="16" height="42" fill="#A1887F"/>
  <!-- Destination badge -->
  <rect x="18" y="18" width="148" height="36" rx="18" fill="rgba(0,0,0,0.45)"/>
  <text x="92" y="41" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="white" font-weight="bold">🏝 Мальдивы</text>
</svg>
