<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7FD4"/><stop offset="55%" stop-color="#C4B0E8"/><stop offset="100%" stop-color="#FFCC80"/></linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D4A96A"/><stop offset="100%" stop-color="#A0785A"/></linearGradient>
    <linearGradient id="arch2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B8860B"/><stop offset="100%" stop-color="#8B6914"/></linearGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#sky2)"/>
  <!-- Moon -->
  <circle cx="680" cy="100" r="38" fill="#FFF9C4" opacity="0.9" filter="url(#glow2)"/>
  <circle cx="695" cy="90" r="30" fill="url(#sky2)" opacity="0.85"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2.5" fill="white" opacity="0.8"/><circle cx="200" cy="40" r="2" fill="white" opacity="0.7"/><circle cx="320" cy="75" r="2" fill="white" opacity="0.6"/>
  <circle cx="450" cy="30" r="2.5" fill="white" opacity="0.8"/><circle cx="530" cy="55" r="2" fill="white" opacity="0.7"/><circle cx="150" cy="140" r="1.8" fill="white" opacity="0.6"/>
  <!-- Sky glow near horizon -->
  <rect x="0" y="290" width="800" height="60" fill="#FFB347" opacity="0.18"/>
  <!-- Ground -->
  <rect y="340" width="800" height="160" fill="url(#ground2)"/>
  <!-- Road / plaza stones -->
  <rect x="0" y="370" width="800" height="130" fill="#C4A882" opacity="0.5"/>
  <!-- Colosseum main arches - central structure -->
  <rect x="180" y="175" width="440" height="170" fill="url(#arch2)" rx="4"/>
  <!-- Colosseum arch rows -->
  <g fill="#FFCC80" opacity="0.35">
    <rect x="200" y="185" width="25" height="40" rx="12"/><rect x="237" y="185" width="25" height="40" rx="12"/>
    <rect x="274" y="185" width="25" height="40" rx="12"/><rect x="311" y="185" width="25" height="40" rx="12"/>
    <rect x="348" y="185" width="25" height="40" rx="12"/><rect x="385" y="185" width="25" height="40" rx="12"/>
    <rect x="422" y="185" width="25" height="40" rx="12"/><rect x="459" y="185" width="25" height="40" rx="12"/>
    <rect x="496" y="185" width="25" height="40" rx="12"/><rect x="533" y="185" width="25" height="40" rx="12"/>
    <rect x="200" y="235" width="25" height="40" rx="12"/><rect x="237" y="235" width="25" height="40" rx="12"/>
    <rect x="274" y="235" width="25" height="40" rx="12"/><rect x="311" y="235" width="25" height="40" rx="12"/>
    <rect x="348" y="235" width="25" height="40" rx="12"/><rect x="385" y="235" width="25" height="40" rx="12"/>
    <rect x="422" y="235" width="25" height="40" rx="12"/><rect x="459" y="235" width="25" height="40" rx="12"/>
    <rect x="496" y="235" width="25" height="40" rx="12"/><rect x="533" y="235" width="25" height="40" rx="12"/>
    <rect x="200" y="285" width="25" height="35" rx="10"/><rect x="274" y="285" width="25" height="35" rx="10"/>
    <rect x="348" y="285" width="25" height="35" rx="10"/><rect x="422" y="285" width="25" height="35" rx="10"/>
    <rect x="496" y="285" width="25" height="35" rx="10"/>
  </g>
  <!-- Windows / dark archways overlay -->
  <rect x="180" y="170" width="440" height="8" fill="#8B6914"/>
  <rect x="180" y="225" width="440" height="5" fill="#8B6914" opacity="0.5"/>
  <!-- Cypress trees -->
  <ellipse cx="130" cy="310" rx="18" ry="60" fill="#2E7D32"/>
  <ellipse cx="155" cy="318" rx="14" ry="52" fill="#388E3C"/>
  <ellipse cx="645" cy="310" rx="18" ry="60" fill="#2E7D32"/>
  <ellipse cx="668" cy="318" rx="14" ry="52" fill="#388E3C"/>
  <!-- Small arch ruin on right -->
  <rect x="660" y="255" width="85" height="90" fill="#C4873A" rx="3" opacity="0.85"/>
  <rect x="690" y="215" width="26" height="80" fill="#C4873A" rx="2"/>
  <rect x="718" y="215" width="26" height="80" fill="#C4873A" rx="2"/>
  <path d="M690 215 Q703 195 716 215" fill="#C4873A"/>
  <!-- Warm glow on ground -->
  <ellipse cx="400" cy="380" rx="320" ry="30" fill="#FF7043" opacity="0.08"/>
  <!-- Destination badge -->
  <rect x="18" y="18" width="148" height="36" rx="18" fill="rgba(30,0,60,0.55)"/>
  <text x="92" y="41" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="white" font-weight="bold">🏛 Рим / Италия</text>
