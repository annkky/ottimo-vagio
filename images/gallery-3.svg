<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0D0D2E"/><stop offset="40%" stop-color="#FF7043"/><stop offset="70%" stop-color="#FFAB91"/><stop offset="100%" stop-color="#FFD54F"/></linearGradient>
    <linearGradient id="desert3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="bldg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A1A3E"/><stop offset="100%" stop-color="#2D1B69"/></linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#sky3)"/>
  <!-- Sun setting -->
  <circle cx="400" cy="320" r="55" fill="#FFD54F" opacity="0.88" filter="url(#glow3)"/>
  <circle cx="400" cy="320" r="80" fill="#FF7043" opacity="0.18"/>
  <!-- Stars top -->
  <circle cx="60" cy="50" r="2" fill="white" opacity="0.9"/><circle cx="120" cy="30" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="200" cy="60" r="2.2" fill="white" opacity="0.9"/><circle cx="280" cy="25" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="550" cy="35" r="2" fill="white" opacity="0.8"/><circle cx="650" cy="55" r="2.2" fill="white" opacity="0.9"/>
  <circle cx="720" cy="25" r="1.8" fill="white" opacity="0.7"/><circle cx="760" cy="45" r="2" fill="white" opacity="0.8"/>
  <!-- Desert dunes -->
  <path d="M0 380 Q150 340 300 360 Q450 380 600 345 Q700 320 800 350 L800 500 L0 500Z" fill="url(#desert3)"/>
  <path d="M0 420 Q200 395 400 410 Q600 425 800 400 L800 500 L0 500Z" fill="#F59E0B" opacity="0.6"/>
  <!-- City skyline - dark silhouette -->
  <!-- Burj Khalifa (tallest, center-right) -->
  <rect x="490" y="80" width="22" height="290" fill="url(#bldg3)"/>
  <polygon points="490,80 512,80 501,35" fill="url(#bldg3)"/>
  <rect x="478" y="130" width="46" height="240" fill="url(#bldg3)"/>
  <rect x="466" y="185" width="70" height="185" fill="url(#bldg3)"/>
  <rect x="455" y="220" width="92" height="150" fill="url(#bldg3)"/>
  <!-- Windows on Burj -->
  <g fill="#FF7043" opacity="0.5">
    <rect x="499" y="100" width="4" height="6"/><rect x="499" y="115" width="4" height="6"/>
    <rect x="499" y="130" width="4" height="6"/><rect x="493" y="145" width="4" height="6"/>
    <rect x="499" y="145" width="4" height="6"/><rect x="505" y="145" width="4" height="6"/>
  </g>
  <!-- Other buildings -->
  <rect x="550" y="200" width="55" height="170" fill="url(#bldg3)"/>
  <rect x="565" y="185" width="25" height="185" fill="url(#bldg3)"/>
  <rect x="610" y="220" width="45" height="150" fill="url(#bldg3)"/>
  <rect x="655" y="230" width="40" height="140" fill="url(#bldg3)"/>
  <rect x="695" y="240" width="55" height="130" fill="url(#bldg3)"/>
  <rect x="750" y="255" width="50" height="115" fill="url(#bldg3)"/>
  <rect x="380" y="215" width="65" height="155" fill="url(#bldg3)"/>
  <rect x="305" y="235" width="55" height="135" fill="url(#bldg3)"/>
  <rect x="235" y="250" width="50" height="120" fill="url(#bldg3)"/>
  <rect x="175" y="265" width="45" height="105" fill="url(#bldg3)"/>
  <rect x="120" y="275" width="40" height="95" fill="url(#bldg3)"/>
  <rect x="70" y="285" width="35" height="85" fill="url(#bldg3)"/>
  <!-- Lit windows orange glow -->
  <g fill="#FF7043" opacity="0.6">
    <rect x="555" y="210" width="5" height="5"/><rect x="565" y="220" width="5" height="5"/><rect x="575" y="210" width="5" height="5"/>
    <rect x="555" y="225" width="5" height="5"/><rect x="575" y="225" width="5" height="5"/>
    <rect x="615" y="228" width="5" height="5"/><rect x="625" y="235" width="5" height="5"/>
    <rect x="385" y="223" width="5" height="5"/><rect x="395" y="215" width="5" height="5"/><rect x="405" y="223" width="5" height="5"/>
  </g>
  <!-- Reflections in water/pool strip at bottom -->
  <rect x="0" y="365" width="800" height="8" fill="#FFD54F" opacity="0.2"/>
  <!-- Destination badge -->
  <rect x="18" y="18" width="128" height="36" rx="18" fill="rgba(0,0,0,0.55)"/>
  <text x="82" y="41" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="white" font-weight="bold">🌆 Дубай</text>
</svg>
