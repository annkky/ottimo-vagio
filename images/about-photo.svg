<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A1A2E"/><stop offset="50%" stop-color="#2D1B69"/><stop offset="100%" stop-color="#0D2137"/></linearGradient>
    <linearGradient id="world" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.25"/><stop offset="100%" stop-color="#9B7FD4" stop-opacity="0.25"/></linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF7043"/><stop offset="100%" stop-color="#D84315"/></linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2DD4BF"/><stop offset="100%" stop-color="#0D9488"/></linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7FD4"/><stop offset="100%" stop-color="#7B5CB8"/></linearGradient>
    <filter id="glow_a"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- World map silhouette (simplified oval) -->
  <ellipse cx="400" cy="250" rx="340" ry="195" fill="none" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="6,6" opacity="0.3"/>
  <ellipse cx="400" cy="250" rx="340" ry="195" fill="url(#world)"/>
  <!-- Latitude/longitude lines -->
  <line x1="60" y1="250" x2="740" y2="250" stroke="#9B7FD4" stroke-width="0.8" stroke-dasharray="4,8" opacity="0.35"/>
  <line x1="400" y1="55" x2="400" y2="445" stroke="#9B7FD4" stroke-width="0.8" stroke-dasharray="4,8" opacity="0.35"/>
  <ellipse cx="400" cy="250" rx="340" ry="80" fill="none" stroke="#9B7FD4" stroke-width="0.6" stroke-dasharray="4,8" opacity="0.2"/>
  <ellipse cx="400" cy="250" rx="200" ry="195" fill="none" stroke="#9B7FD4" stroke-width="0.6" stroke-dasharray="4,8" opacity="0.2"/>
  <!-- Floating destination cards -->
  <!-- Card 1: Maldives -->
  <rect x="55" y="310" width="145" height="80" rx="12" fill="url(#card1)" filter="url(#shadow)" opacity="0.92"/>
  <text x="127" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="white">🏝</text>
  <text x="127" y="358" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="white" font-weight="bold">Мальдивы</text>
  <text x="127" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Тропический рай</text>
  <!-- Card 2: Italy -->
  <rect x="560" y="155" width="145" height="80" rx="12" fill="url(#card3)" filter="url(#shadow)" opacity="0.92"/>
  <text x="632" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="white">🏛</text>
  <text x="632" y="203" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="white" font-weight="bold">Рим / Италия</text>
  <text x="632" y="219" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Вечный город</text>
  <!-- Card 3: Dubai -->
  <rect x="530" y="310" width="145" height="80" rx="12" fill="url(#card1)" filter="url(#shadow)" opacity="0.92"/>
  <text x="602" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="white">🌆</text>
  <text x="602" y="358" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="white" font-weight="bold">Дубай</text>
  <text x="602" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Город будущего</text>
  <!-- Card 4: Alps -->
  <rect x="55" y="140" width="145" height="80" rx="12" fill="url(#card2)" filter="url(#shadow)" opacity="0.92"/>
  <text x="127" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="white">⛰</text>
  <text x="127" y="188" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="white" font-weight="bold">Альпы</text>
  <text x="127" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Горные приключения</text>
  <!-- Connecting dots on map (location pins) -->
  <!-- Pin Maldives -->
  <circle cx="490" cy="320" r="6" fill="#FF7043" filter="url(#glow_a)"/>
  <circle cx="490" cy="320" r="12" fill="#FF7043" opacity="0.25"/>
  <!-- Pin Rome -->
  <circle cx="430" cy="205" r="6" fill="#9B7FD4" filter="url(#glow_a)"/>
  <circle cx="430" cy="205" r="12" fill="#9B7FD4" opacity="0.25"/>
  <!-- Pin Dubai -->
  <circle cx="500" cy="240" r="6" fill="#FF7043" filter="url(#glow_a)"/>
  <circle cx="500" cy="240" r="12" fill="#FF7043" opacity="0.25"/>
  <!-- Pin Alps -->
  <circle cx="415" cy="195" r="6" fill="#2DD4BF" filter="url(#glow_a)"/>
  <circle cx="415" cy="195" r="12" fill="#2DD4BF" opacity="0.25"/>
  <!-- Pin Istanbul -->
  <circle cx="450" cy="210" r="6" fill="#FF7043" filter="url(#glow_a)"/>
  <circle cx="450" cy="210" r="12" fill="#FF7043" opacity="0.2"/>
  <!-- Connection lines from pins to cards -->
  <line x1="490" y1="320" x2="200" y2="350" stroke="#FF7043" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="430" y1="205" x2="560" y2="195" stroke="#9B7FD4" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="500" y1="240" x2="530" y2="350" stroke="#FF7043" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="415" y1="195" x2="200" y2="180" stroke="#2DD4BF" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Floating plane icon -->
  <text x="310" y="165" font-size="26" fill="#FF7043" opacity="0.85" transform="rotate(-25,310,165)">✈</text>
  <text x="540" y="285" font-size="20" fill="#2DD4BF" opacity="0.7" transform="rotate(15,540,285)">✈</text>
  <!-- Floating compass rose -->
  <g transform="translate(390,258)" opacity="0.18">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#2DD4BF" stroke-width="2"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#2DD4BF" stroke-width="2"/>
    <polygon points="0,-22 3,-10 -3,-10" fill="#2DD4BF"/>
    <polygon points="0,22 3,10 -3,10" fill="#9B7FD4"/>
    <polygon points="22,0 10,3 10,-3" fill="#9B7FD4"/>
    <polygon points="-22,0 -10,3 -10,-3" fill="#9B7FD4"/>
    <circle r="5" fill="#FF7043"/>
  </g>
  <!-- Orbiting glow dots -->
  <circle cx="250" cy="100" r="5" fill="#FF7043" opacity="0.7" filter="url(#glow_a)"/>
  <circle cx="600" cy="400" r="4" fill="#2DD4BF" opacity="0.6" filter="url(#glow_a)"/>
  <circle cx="700" cy="150" r="4" fill="#9B7FD4" opacity="0.65" filter="url(#glow_a)"/>
  <circle cx="110" cy="380" r="4" fill="#2DD4BF" opacity="0.6" filter="url(#glow_a)"/>
</svg>
